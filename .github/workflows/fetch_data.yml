name: 需給データ自動取得

on:
  schedule:
    # ======================================================
    # スケジュール: JST → UTC 変換（JST = UTC+9）
    # ======================================================
    # JST 8:30 weekdays  → UTC 23:30 前日 (Sun–Thu)
    - cron: '30 23 * * 0,1,2,3,4'
    # JST 15:30 weekdays → UTC 06:30 (Mon–Fri)
    - cron: '30 6 * * 1,2,3,4,5'
    # JST 19:00 weekdays → UTC 10:00 (Mon–Fri)
    - cron: '0 10 * * 1,2,3,4,5'
    # JST 20:00 Thursday only → UTC 11:00 (Thu)   週次統計公表集中
    - cron: '0 11 * * 4'
    # JST 23:00 weekdays → UTC 14:00 (Mon–Fri)
    - cron: '0 14 * * 1,2,3,4,5'

  # 手動実行（テスト・強制再取得時）
  workflow_dispatch:
    inputs:
      force:
        description: 'キャッシュを無視して強制再取得 (--force)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  fetch:
    name: データ取得・GEX計算
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data/ へのコミット・プッシュに必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: テスト実行（SQカレンダー・静的ロジック）
        run: python -m pytest tests/test_sq_calendar.py -v --tb=short
        # フェッチャー実行前に静的ロジックのみ検証
        # GEX有効性テスト・Streamlitスモークテストはデータ取得後に別途実行可

      - name: フェッチャー実行
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # Phase 2 以降で使用
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/run_fetchers.py $FORCE_FLAG

      - name: データ変更をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 変更がある場合のみコミット
          if git diff --staged --quiet; then
            echo "データに変更なし。コミットをスキップします。"
          else
            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')
            git commit -m "data: 需給データ更新 ${TIMESTAMP}"
            git push
          fi
